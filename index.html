<!DOCTYPE html>
<html>
<head>
  <title>Mukesh Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0f2027;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ffc3;
    }

    form {
      max-width: 400px;
      margin: auto;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      background: #00ffc3;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    #status {
      margin-top: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<h1>Hello, I'm Mukesh 🚀</h1>
<p>Full Stack Developer in Progress</p>

<h2>Contact Me</h2>

<form id="contactForm">
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="email" id="email" placeholder="Your Email" required>
  <textarea id="message" placeholder="Your Message" required></textarea>
  <button type="submit">Send Message</button>
</form>

<p id="status"></p>

<script>
document.getElementById("contactForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const message = document.getElementById("message").value;

  const response = await fetch("https://mukesh-backend.onrender.com/contact", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, email, message })
  });

  const data = await response.json();

  if (data.success) {
    document.getElementById("status").innerText = "Message sent successfully 🚀";
  } else {
    document.getElementById("status").innerText = "Something went wrong ❌";
  }
});
</script>

</body>
</html>
